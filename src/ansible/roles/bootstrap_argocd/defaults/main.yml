---
bootstrap_argocd_force_conflicts: false
bootstrap_argocd_poll_timeout: 10s
bootstrap_argocd_health_retries: 120
bootstrap_argocd_health_delay: 10
bootstrap_argocd_required_crds:
  - applications.argoproj.io
  - applicationsets.argoproj.io
  - appprojects.argoproj.io
bootstrap_argocd_required_workloads:
  - statefulset/argocd-application-controller
  - deployment/argocd-applicationset-controller
  - deployment/argocd-repo-server
  - deployment/argocd-server
  - deployment/argocd-redis-ha-haproxy
  - statefulset/argocd-redis-ha-server
bootstrap_argocd_base_operator_crds:
  - certificates.cert-manager.io
  - clusterissuers.cert-manager.io
  - externalsecrets.external-secrets.io
  - secretstores.external-secrets.io
  - clustersecretstores.external-secrets.io
  - clusters.postgresql.cnpg.io
  - prometheuses.monitoring.coreos.com
  - servicemonitors.monitoring.coreos.com
  - volumes.longhorn.io
bootstrap_argocd_base_operator_workloads:
  - namespace: cert-manager
    selector: app.kubernetes.io/instance=cert-manager
  - namespace: cnpg-system
    selector: app.kubernetes.io/instance=cnpg-operator
  - namespace: external-secrets
    selector: app.kubernetes.io/instance=external-secrets
  - namespace: longhorn-system
    selector: app.kubernetes.io/instance=longhorn
bootstrap_argocd_dependent_operator_crds:
  - bundles.trust.cert-manager.io
  - instrumentations.opentelemetry.io
  - opentelemetrycollectors.opentelemetry.io
bootstrap_argocd_dependent_operator_workloads:
  - namespace: cert-manager
    selector: app.kubernetes.io/instance=trust-manager
  - namespace: observability
    selector: app.kubernetes.io/instance=otel-operator
bootstrap_argocd_configuration_resources:
  - resource: clusterissuer/letsencrypt-prod
    condition: Ready
  - resource: clusterissuer/levizitting-ca
    condition: Ready
  - resource: certificate/levizitting-root-ca
    namespace: cert-manager
    condition: Ready
  - resource: clustersecretstore/aws-ssm
    condition: Ready
  - resource: bundle/levizitting-ca-bundle
    condition: Synced
