---
- name: Apply bootstrap secrets
  ansible.builtin.include_tasks: apply-manifest.yml
  vars:
    bootstrap_argocd_manifest_name: "{{ item.name }}"
    bootstrap_argocd_manifest: "{{ lookup('template', role_path ~ '/templates/' ~ item.template) }}"
    bootstrap_argocd_manifest_secret: true
  loop:
    - name: External Secrets AWS credentials
      template: external-secrets-aws-creds.yaml.j2
    - name: External Secrets AWS credentials in OpenBao namespace
      template: external-secrets-aws-creds-openbao.yaml.j2
    - name: SeaweedFS S3 admin secret
      template: seaweedfs-s3-admin.yaml.j2
    - name: SeaweedFS S3 observability source secret
      template: seaweedfs-s3-observability.yaml.j2
    - name: SeaweedFS S3 observability consumer secret
      template: seaweedfs-s3-observability-consumer.yaml.j2
  loop_control:
    label: "{{ item.name }}"
