---
- name: Apply platform root
  ansible.builtin.include_tasks: apply-manifest.yml
  vars:
    bootstrap_argocd_manifest_name: platform root
    bootstrap_argocd_manifest: "{{ lookup('file', role_path ~ '/files/argocd-platform-root.yaml') }}"

- name: Wait for foundational platform configuration
  ansible.builtin.command:
    argv: >-
      {{
        ['kubectl', 'wait', item.resource, '--for=condition=' ~ item.condition,
         '--timeout=' ~ bootstrap_argocd_poll_timeout]
        + ((item.namespace is defined) | ternary(['--namespace=' ~ (item.namespace | default(''))], []))
      }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _bootstrap_argocd_configuration_ready
  changed_when: false
  failed_when: false
  retries: "{{ bootstrap_argocd_health_retries }}"
  delay: "{{ bootstrap_argocd_health_delay }}"
  until: _bootstrap_argocd_configuration_ready.rc == 0
  loop: "{{ bootstrap_argocd_configuration_resources }}"
  loop_control:
    label: "{{ item.resource }}"
  run_once: true
