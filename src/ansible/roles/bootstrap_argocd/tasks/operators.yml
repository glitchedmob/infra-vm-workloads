---
- name: Apply base operator root
  ansible.builtin.include_tasks: apply-manifest.yml
  vars:
    bootstrap_argocd_manifest_name: base operator root
    bootstrap_argocd_manifest: "{{ lookup('file', role_path ~ '/files/argocd-base-operators-root.yaml') }}"

- name: Wait for base operator CRDs
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=condition=Established
      - "--timeout={{ bootstrap_argocd_poll_timeout }}"
      - "crd/{{ item }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _bootstrap_argocd_base_operator_crd_ready
  changed_when: false
  failed_when: false
  retries: "{{ bootstrap_argocd_health_retries }}"
  delay: "{{ bootstrap_argocd_health_delay }}"
  until: _bootstrap_argocd_base_operator_crd_ready.rc == 0
  loop: "{{ bootstrap_argocd_base_operator_crds }}"
  run_once: true

- name: Wait for base operator workloads
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - "--namespace={{ item.namespace }}"
      - --for=condition=Ready
      - "--timeout={{ bootstrap_argocd_poll_timeout }}"
      - pod
      - "--selector={{ item.selector }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _bootstrap_argocd_base_operator_ready
  changed_when: false
  failed_when: false
  retries: "{{ bootstrap_argocd_health_retries }}"
  delay: "{{ bootstrap_argocd_health_delay }}"
  until: _bootstrap_argocd_base_operator_ready.rc == 0
  loop: "{{ bootstrap_argocd_base_operator_workloads }}"
  loop_control:
    label: "{{ item.namespace }}: {{ item.selector }}"
  run_once: true

- name: Apply dependent operator root
  ansible.builtin.include_tasks: apply-manifest.yml
