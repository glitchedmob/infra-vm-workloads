  register: _bootstrap_argocd_dependent_operator_crd_ready
  changed_when: false
  failed_when: false
  retries: "{{ bootstrap_argocd_health_retries }}"
  delay: "{{ bootstrap_argocd_health_delay }}"
  until: _bootstrap_argocd_dependent_operator_crd_ready.rc == 0
  loop: "{{ bootstrap_argocd_dependent_operator_crds }}"
  run_once: true

- name: Wait for dependent operator workloads
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - "--namespace={{ item.namespace }}"
      - --for=condition=Ready
      - "--timeout={{ bootstrap_argocd_poll_timeout }}"
      - pod
