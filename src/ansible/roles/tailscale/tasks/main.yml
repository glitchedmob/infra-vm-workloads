---
- name: Assert Headscale login server is set
  ansible.builtin.assert:
    that:
      - tailscale_login_server is defined
      - tailscale_login_server | length > 0
    fail_msg: Set tailscale_login_server for k3s_cluster.

- name: Assert SSM auth key path is set
  ansible.builtin.assert:
    that:
      - ssm_tailscale_authkey_path is defined
      - ssm_tailscale_authkey_path | length > 0
    fail_msg: Set ssm_tailscale_authkey_path for each host.

- name: Fetch Tailscale auth key from SSM
  ansible.builtin.set_fact:
    tailscale_authkey_value: "{{ lookup('amazon.aws.aws_ssm', ssm_tailscale_authkey_path) }}"
  no_log: true

- name: Read local subnet routing rules
  ansible.builtin.command:
    argv:
      - ip
      - rule
      - show
      - to
      - "{{ item }}"
  loop: "{{ tailscale_local_subnets }}"
  register: _tailscale_route_rules
  changed_when: false

- name: Prefer local subnets over Tailscale routes
  ansible.builtin.command:
    argv:
      - ip
      - rule
      - add
      - to
      - "{{ item.item }}"
      - priority
      - "2500"
      - lookup
      - main
  loop: "{{ _tailscale_route_rules.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stdout | trim | length == 0
  changed_when: true

- name: Create tailscaled drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/tailscaled.service.d
    state: directory
    mode: "0755"

- name: Persist local subnet routing rules
  ansible.builtin.copy:
    content: |
      # {{ ansible_managed | default('ANSIBLE MANAGED') }}
      [Service]
      {% for route in tailscale_local_subnets %}
      ExecStartPost=-/sbin/ip rule add to {{ route }} priority 2500 lookup main
      {% endfor %}
    dest: /etc/systemd/system/tailscaled.service.d/route-fix.conf
    mode: "0644"
  notify: Reload systemd

- name: Apply systemd configuration before installing Tailscale
  ansible.builtin.meta: flush_handlers

- name: Install and configure Tailscale
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_authkey: "{{ tailscale_authkey_value }}"
    tailscale_args: >-
      --login-server={{ tailscale_login_server }}
      --accept-routes
  no_log: true

- name: Wait for Tailscale to reconnect
  ansible.builtin.command: tailscale status --json
  register: _tailscale_status
  until: (_tailscale_status.stdout | from_json).Self.Online
  retries: 30
  delay: 2
  changed_when: false
