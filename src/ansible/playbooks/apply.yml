---
- name: Bootstrap Argo CD and baseline manifests
  hosts: k3s_servers
  become: true
  gather_facts: true
  tasks:
    - name: Fetch Argo CD SSM values
      ansible.builtin.set_fact:
        git_deploy_private_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_git_deploy_private_key_path)
             if ssm_git_deploy_private_key_path is defined else omit }}
        eso_access_key_id: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_eso_access_key_id_path)
             if ssm_eso_access_key_id_path is defined else omit }}
        eso_secret_access_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_eso_secret_access_key_path)
             if ssm_eso_secret_access_key_path is defined else omit }}
        seaweedfs_s3_admin_access_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_seaweedfs_s3_admin_access_key_path)
             if ssm_seaweedfs_s3_admin_access_key_path is defined else omit }}
        seaweedfs_s3_admin_secret_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_seaweedfs_s3_admin_secret_key_path)
             if ssm_seaweedfs_s3_admin_secret_key_path is defined else omit }}
        seaweedfs_s3_observability_access_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_seaweedfs_s3_obs_access_key_path)
             if ssm_seaweedfs_s3_obs_access_key_path is defined else omit }}
        seaweedfs_s3_observability_secret_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_seaweedfs_s3_obs_secret_key_path)
             if ssm_seaweedfs_s3_obs_secret_key_path is defined else omit }}
      run_once: true

    - name: Fetch GitHub SSH known_hosts
      ansible.builtin.command:
        cmd: ssh-keyscan -t ed25519 github.com
      register: github_known_hosts
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Render Argo CD install manifest in memory
      ansible.builtin.set_fact:
        argocd_install_manifest: "{{ lookup('url', 'https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/ha/install.yaml', split_lines=False) }}"
      run_once: true

    - name: Render manifest files in memory
      ansible.builtin.set_fact:
        namespaces_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/namespaces.yaml') }}"
        argocd_repo_secret_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-repo-secret.yaml.j2') }}"
        argocd_ssh_known_hosts_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-ssh-known-hosts-cm.yaml.j2') }}"
        argocd_root_app_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/argocd-root-app.yaml') }}"
        external_secrets_aws_creds_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/external-secrets-aws-creds.yaml.j2') }}"
        external_secrets_aws_creds_openbao_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/external-secrets-aws-creds-openbao.yaml.j2') }}"
        seaweedfs_s3_admin_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/seaweedfs-s3-admin.yaml.j2') }}"
        seaweedfs_s3_observability_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/seaweedfs-s3-observability.yaml.j2') }}"
        seaweedfs_s3_monitoring_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/seaweedfs-s3-monitoring.yaml.j2') }}"
      run_once: true

    - name: Apply namespace manifest
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ namespaces_manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      run_once: true

    - name: Apply Argo CD install manifest
      ansible.builtin.command: kubectl apply -n argocd -f -
      args:
        stdin: "{{ argocd_install_manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      run_once: true

    - name: Apply Argo CD bootstrap manifests
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ item.manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      loop:
        - name: argocd repo secret
          manifest: "{{ argocd_repo_secret_manifest }}"
        - name: argocd ssh known hosts
          manifest: "{{ argocd_ssh_known_hosts_manifest }}"
        - name: argocd root app
          manifest: "{{ argocd_root_app_manifest }}"
        - name: external-secrets aws creds
          manifest: "{{ external_secrets_aws_creds_manifest }}"
        - name: seaweedfs s3 admin secret
          manifest: "{{ seaweedfs_s3_admin_manifest }}"
        - name: seaweedfs s3 observability secret
          manifest: "{{ seaweedfs_s3_observability_manifest }}"
        - name: seaweedfs s3 monitoring secret
          manifest: "{{ seaweedfs_s3_monitoring_manifest }}"
      loop_control:
        label: "{{ item.name }}"
      run_once: true

    - name: Apply external-secrets aws creds (openbao ns)
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ external_secrets_aws_creds_openbao_manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      run_once: true
