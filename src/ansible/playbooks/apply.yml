---
- name: Bootstrap Argo CD and baseline manifests
  hosts: k3s_servers
  become: true
  gather_facts: true
  tasks:
    - name: Fetch Argo CD SSM values
      ansible.builtin.set_fact:
        git_deploy_private_key: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_git_deploy_private_key_path)
             if ssm_git_deploy_private_key_path is defined else omit }}
        argocd_github_oauth_client_id: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_argocd_github_oauth_client_id_path)
             if ssm_argocd_github_oauth_client_id_path is defined else omit }}
        argocd_github_oauth_client_secret: >-
          {{ lookup('amazon.aws.aws_ssm', ssm_argocd_github_oauth_client_secret_path)
             if ssm_argocd_github_oauth_client_secret_path is defined else omit }}
      run_once: true

    - name: Fetch GitHub SSH known_hosts
      ansible.builtin.command:
        cmd: ssh-keyscan -t ed25519 github.com
      register: github_known_hosts
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Render Argo CD install manifest in memory
      ansible.builtin.set_fact:
        argocd_install_manifest: "{{ lookup('url', 'https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.10/manifests/install.yaml', split_lines=False) }}"
      run_once: true

    - name: Render manifest files in memory
      ansible.builtin.set_fact:
        namespaces_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/namespaces.yaml') }}"
        argocd_repo_secret_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-repo-secret.yaml.j2') }}"
        argocd_oauth_secret_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-oauth-secret.yaml.j2') }}"
        argocd_ssh_known_hosts_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-ssh-known-hosts-cm.yaml.j2') }}"
        argocd_cm_manifest: "{{ lookup('template', playbook_dir ~ '/manifests/argocd-cm.yaml.j2') }}"
        argocd_cmd_params_cm_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/argocd-cmd-params-cm.yaml') }}"
        argocd_rbac_cm_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/argocd-rbac-cm.yaml') }}"
        argocd_root_app_manifest: "{{ lookup('file', playbook_dir ~ '/manifests/argocd-root-app.yaml') }}"
      run_once: true

    - name: Apply namespace manifest
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ namespaces_manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      run_once: true

    - name: Apply Argo CD install manifest (server-side)
      ansible.builtin.command: kubectl apply --server-side --force-conflicts -n argocd -f -
      args:
        stdin: "{{ argocd_install_manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      run_once: true

    - name: Apply Argo CD config and bootstrap manifests
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ item.manifest }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_apply_result
      changed_when: "'created' in (kubectl_apply_result.stdout | default('')) or 'configured' in (kubectl_apply_result.stdout | default(''))"
      loop:
        - name: argocd config
          manifest: "{{ argocd_cm_manifest }}"
        - name: argocd cmd params config
          manifest: "{{ argocd_cmd_params_cm_manifest }}"
        - name: argocd rbac config
          manifest: "{{ argocd_rbac_cm_manifest }}"
        - name: argocd repo secret
          manifest: "{{ argocd_repo_secret_manifest }}"
        - name: argocd oauth secret
          manifest: "{{ argocd_oauth_secret_manifest }}"
        - name: argocd ssh known hosts
          manifest: "{{ argocd_ssh_known_hosts_manifest }}"
        - name: argocd root app
          manifest: "{{ argocd_root_app_manifest }}"
      loop_control:
        label: "{{ item.name }}"
      run_once: true
