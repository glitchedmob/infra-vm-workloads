---
- name: Prepare nodes for K3s
  hosts: k3s_cluster
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
  roles:
    - k3s.orchestration.prereq
  tasks:
    - name: Raise inotify limits for workloads with many file watchers
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-k3s-inotify.conf
      loop:
        - { key: "fs.inotify.max_user_instances", value: "8192" }
        - { key: "fs.inotify.max_user_watches", value: "524288" }

    - name: Install Longhorn prerequisite packages
      ansible.builtin.apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true

    - name: Start and enable iscsid service
      ansible.builtin.systemd:
        name: iscsid
        state: started
        enabled: true

- name: Install K3s server nodes
  hosts: k3s_servers
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
    cluster_context: lz-k3s
  roles:
    - k3s.orchestration.k3s_server

- name: Install K3s agent nodes
  hosts: k3s_agents
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
  roles:
    - k3s.orchestration.k3s_agent
