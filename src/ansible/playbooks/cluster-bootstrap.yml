---
- name: Prepare nodes for K3s
  hosts: k3s_cluster
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
  roles:
    - role: prepare_nodes
      tags: prepare_nodes
    - role: prepare_storage
      tags: prepare_storage
    - role: tailscale
      tags: tailscale
    - role: k3s.orchestration.prereq
      tags: k3s_prereq

- name: Install K3s server nodes
  hosts: k3s_servers
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
    cluster_context: lz-k3s
  roles:
    - role: k3s.orchestration.k3s_server
      tags: k3s_server

- name: Install K3s agent nodes
  hosts: k3s_agents
  become: true
  gather_facts: true
  vars:
    server_group: k3s_servers
    agent_group: k3s_agents
    api_endpoint: "{{ hostvars[groups[server_group][0]].ansible_host | default(groups[server_group][0]) }}"
  roles:
    - role: k3s.orchestration.k3s_agent
      tags: k3s_agent

- name: Bootstrap Argo CD and baseline manifests
  hosts: k3s_servers
  become: true
  gather_facts: true
  roles:
    - role: bootstrap_argocd
      tags: bootstrap_argocd
