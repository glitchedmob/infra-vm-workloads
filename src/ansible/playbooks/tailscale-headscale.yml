---
- name: Configure Tailscale with Headscale
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Assert Headscale login server is set
      ansible.builtin.assert:
        that:
          - tailscale_login_server is defined
          - tailscale_login_server | length > 0
        fail_msg: "Set tailscale_login_server for k3s_cluster."

    - name: Assert SSM auth key path is set
      ansible.builtin.assert:
        that:
          - ssm_tailscale_authkey_path is defined
          - ssm_tailscale_authkey_path | length > 0
        fail_msg: "Set ssm_tailscale_authkey_path for each host."

    - name: Fetch Tailscale auth key from SSM
      ansible.builtin.set_fact:
        tailscale_authkey_value: "{{ lookup('amazon.aws.aws_ssm', ssm_tailscale_authkey_path) }}"

    - name: Prefer local subnets over tailscale routes
      ansible.builtin.shell: |
        for subnet in {{ tailscale_local_subnets.replace(',', ' ') }}; do
          ip rule add to "$subnet" priority 2500 lookup main 2>/dev/null || true
        done
      changed_when: false

    - name: Create tailscaled drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/tailscaled.service.d
        state: directory
        mode: "0755"

    - name: Persist route fix via systemd drop-in
      vars:
        _ts_routes: "{{ tailscale_local_subnets.split(',') }}"
      ansible.builtin.copy:
        content: |
          # {{ ansible_managed | default('ANSIBLE MANAGED') }}
          [Service]
          {% for route in _ts_routes %}
          ExecStartPost=/sbin/ip rule add to {{ route }} priority 2500 lookup main || true
          {% endfor %}
        dest: /etc/systemd/system/tailscaled.service.d/route-fix.conf
        mode: "0644"
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Install and configure Tailscale
      ansible.builtin.include_role:
        name: artis3n.tailscale.machine
      vars:
        tailscale_authkey: "{{ tailscale_authkey_value }}"
        tailscale_args: >-
          --login-server={{ tailscale_login_server }}
          --accept-routes

    - name: Wait for Tailscale to reconnect
      ansible.builtin.command: tailscale status --json
      register: _ts_status
      until: (_ts_status.stdout | from_json).Self.Online
      retries: 30
      delay: 2
      changed_when: false
